name: Fetch PIB Sources

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run PIB source fetcher
        run: node scripts/fetchPibSources.js

      - name: Upload JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: pib-sources-json
          path: data/pibSources.json
