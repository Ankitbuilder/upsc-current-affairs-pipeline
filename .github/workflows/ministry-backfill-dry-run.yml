name: Ministry Backfill Dry Run

on:
  workflow_dispatch:

jobs:
  dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run dry backfill
        run: node scripts/backfillMinistry.js

      - name: Upload dry run reports
        uses: actions/upload-artifact@v4
        with:
          name: ministry-dry-run-reports
          path: |
            data/ministry-backfill-report.json
            data/ministry-review-needed.json
          if-no-files-found: error
