name: UPSC Pipeline Test

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 360 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # Running "npm install" is safer to ensure all dependencies in package.json are resolved
        run: npm install

      # 🆕 Separated into its own step to prevent YAML parser errors
      - name: Run Reset Script
        run: node scripts/forceRetry.js
        env:
          TZ: "Asia/Kolkata"

      - name: Run Fetch Pipeline
        run: node scripts/index.js
        env:
          TZ: "Asia/Kolkata"

      - name: Run Bulletproof Summarizer
        run: node scripts/summarizer.js
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TZ: "Asia/Kolkata"

      - name: Upload to Cloudflare R2
        run: node scripts/uploadToR2.js
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}

      - name: Commit generated data
        # Use pull --rebase to gracefully merge changes and avoid divert conflicts during push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*
          git commit -m "Steady progress via Quad-Model AI Pipeline" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin HEAD:main
