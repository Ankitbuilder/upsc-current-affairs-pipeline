name: UPSC Pipeline Test

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 360 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios cheerio dotenv @google/genai

      - name: Run Fetch Pipeline
        run: node scripts/index.js
        env:
          TZ: "Asia/Kolkata"

      - name: Run Bulletproof Summarizer
        run: node scripts/summarizer.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TZ: "Asia/Kolkata"

      - name: Upload to Cloudflare R2
        run: node scripts/uploadToR2.js
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}

      - name: Commit generated data
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com
          git add data/*
          git pull origin main
          git commit -m "Steady progress via Tri-Model AI Pipeline" || echo "No changes"
          git push
