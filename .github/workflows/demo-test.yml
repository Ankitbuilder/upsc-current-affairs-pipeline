name: UPSC Demo Test Run

on:
  workflow_dispatch: # ✅ Manual trigger only

jobs:
  test-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # DEMO PHASE: Force the summarizer to focus only on 2026-02-27
      - name: Run AI Summarizer (Demo Mode)
        run: |
          echo "Starting demo for 2026-02-27.json"
          node scripts/summarizer.js
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # We set the TZ to ensure date calculations match your local data
          TZ: "Asia/Kolkata"

      # DEMO PHASE: Sync only this specific change to R2
      - name: Upload Demo Results to R2
        run: node scripts/uploadToR2.js
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

      # DEMO PHASE: Commit the summary so you can see it in your repo
      - name: Commit Demo Output
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git pull origin main
          git add data/2026-02-27.json
          git commit -m "DEMO: AI Summary for 2026-02-27" || echo "No changes"
          git push
