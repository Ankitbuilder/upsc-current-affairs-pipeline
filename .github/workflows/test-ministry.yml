name: Run Test Ministry Script

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:   # allows manual run

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Install dependencies
        run: npm install axios cheerio

      - name: ▶️ Run testMinistry.js
        run: node testMinistry.js
